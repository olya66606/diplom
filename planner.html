<!DOCTYPE html>
<html lang="en">
<head >
  <link rel="icon" href="img/logoosn.png" type="image/x-icon" style="width: 100px;">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap-5.3.3-dist/bootstrap-5.3.3-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
    <title>Конструктор маршрутов | Туры Везде</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Mulish', sans-serif; background: linear-gradient(135deg, #bcddff54, #98dbb8a1); }
        /* Стили header (можно скопировать из style.css) - для краткости я их опущу, но они должны быть */
        .header { border-radius: 12px; padding: 0 25px; height: 70px; display: flex; align-items: center; justify-content: space-between; margin: 0 auto; width: 100%; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background-color: white; transition: all 0.3s ease; }
        .header-left { display: flex; align-items: center; gap: 20px; width: 800px; }
        .header a { color: #246d3e; text-decoration: none; font-size: 23px; transition: color 0.3s ease; font-family: "Mulish", sans-serif; font-weight: 500; }
        .header-logo>img { margin: 0 auto; height: 70px; width: 100px; display: flex; margin-right: 350px; }
        .header-right>.lihka { background: #00a3c400; color: #246d3e; border: 2px solid #246d3e; border-radius: 50px; padding: 10px; font-size: 23px; width: 200px; text-align: center; }
        body { padding-top: 90px; }
        
        /* Стили планировщика */
        .planner-container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            gap: 20px;
        }
        .planner-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            height: fit-content;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }
        .planner-section h2 {
            color: #1b5031;
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e3f7ee;
        }
        #map {
            height: 400px;
            width: 100%;
            border-radius: 15px;
            z-index: 1;
            margin-bottom: 20px;
        }
        .place-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #2e8d53;
            transition: transform 0.2s;
        }
        .place-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .place-item h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
            color: #333;
        }
        .place-item .place-address {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .place-item .place-rating {
            color: #f39c12;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .place-item .place-review {
            color: #555;
            font-size: 0.9rem;
            font-style: italic;
            margin-bottom: 10px;
            padding: 8px;
            background: #e3f7ee;
            border-radius: 8px;
        }
        .place-item .add-to-route-btn {
            background: #1b5031;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            width: 100%;
        }
        .place-item .add-to-route-btn:hover {
            background: #2e8d53;
        }
        .route-item {
            background: #e3f7ee;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .route-item .remove-btn {
            background: none;
            border: none;
            color: #e74c3c;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .clear-route-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 25px;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
        }
        @media (max-width: 992px) {
            .planner-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <a href="index.html">Главная</a>
            <a href="about.html">О нас</a>
            <a href="planner.html">Конструктор маршрутов</a>
        </div>
        <div class="header-logo"><img src="img/logo.png" alt=""></div>
        <div class="header-right"> 
            <a style="margin-right: 20px; margin-top:11px;" href="locals.html" id="localsLink">Места от жителей</a>
            <a class="lihka" id="authButton" href="login.html">Войти</a>
        </div>
    </header>

    <div class="planner-container">
        <!-- Список достопримечательностей -->
        <div class="planner-section">
            <h2><i class="bi bi-building"></i> Достопримечательности СПб</h2>
            <div id="placesList"></div>
        </div>

        <!-- Карта -->
        <div class="planner-section">
            <h2><i class="bi bi-map"></i> Интерактивная карта</h2>
            <div id="map"></div>
            <p style="color:#666; font-size:0.9rem;">* Нажмите на место в списке, чтобы увидеть его на карте.</p>
        </div>

        <!-- Построенный маршрут -->
        <div class="planner-section">
            <h2><i class="bi bi-signpost-split"></i> Ваш маршрут</h2>
            <div id="routeList"></div>
            <button class="clear-route-btn" id="clearRouteBtn">Очистить маршрут</button>
        </div>
    </div>

    <footer>
        <!-- Здесь ваш футер (скопируйте из index.html) -->
        <div class="footer-container">...</div>
    </footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://kit.fontawesome.com/your-fontawesome-kit.js" crossorigin="anonymous"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- Логика шапки (скопировать из index.html) ---
            const currentUser = JSON.parse(localStorage.getItem('current_user'));
            const localsLink = document.getElementById('localsLink');
            const authButton = document.getElementById('authButton');
            if (currentUser) { if (localsLink) localsLink.style.display = 'inline-block'; if (authButton) { authButton.textContent = currentUser.name || 'Профиль'; authButton.href = 'profile.html'; } }
            else { if (localsLink) localsLink.style.display = 'none'; if (authButton) { authButton.textContent = 'Войти'; authButton.href = 'login.html'; } }

            // --- Данные о местах (Санкт-Петербург) ---
            const places = [
                { id: 1, name: 'Государственный Эрмитаж', coords: [59.9402, 30.3141], address: 'Дворцовая пл., 2', rating: 4.9, review: 'Великолепная коллекция искусства! Обязательно к посещению.' },
                { id: 2, name: 'Петропавловская крепость', coords: [59.9501, 30.3166], address: 'Петропавловская крепость, 3', rating: 4.7, review: 'Историческое место, откуда начался город. Красивый вид на Неву.' },
                { id: 3, name: 'Исаакиевский собор', coords: [59.9340, 30.3062], address: 'Исаакиевская пл., 4', rating: 4.8, review: 'Потрясающая архитектура и колоннада с видом на город.' },
                { id: 4, name: 'Храм Спаса на Крови', coords: [59.9401, 30.3287], address: 'наб. канала Грибоедова, 2Б', rating: 4.9, review: 'Сказочный храм, очень красиво внутри и снаружи.' },
                { id: 5, name: 'Русский музей', coords: [59.9376, 30.3325], address: 'Инженерная ул., 4', rating: 4.7, review: 'Огромная коллекция русского искусства. Рекомендую.' },
                { id: 6, name: 'Кунсткамера', coords: [59.9416, 30.3044], address: 'Университетская наб., 3', rating: 4.5, review: 'Очень интересный музей антропологии. Не для слабонервных.)' },
            ];

            const placesListDiv = document.getElementById('placesList');
            const routeListDiv = document.getElementById('routeList');
            const clearBtn = document.getElementById('clearRouteBtn');
            let currentRoute = JSON.parse(localStorage.getItem('user_route')) || [];

            // --- Инициализация карты ---
            const map = L.map('map').setView([59.9343, 30.3351], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            const markers = {};
            places.forEach(place => {
                const marker = L.marker(place.coords).addTo(map).bindPopup(`<b>${place.name}</b><br>${place.address}`);
                markers[place.id] = marker;
            });

            // --- Функция отображения списка мест ---
            function renderPlacesList() {
                placesListDiv.innerHTML = '';
                places.forEach(place => {
                    const placeDiv = document.createElement('div');
                    placeDiv.className = 'place-item';
                    placeDiv.innerHTML = `
                        <h3>${place.name}</h3>
                        <div class="place-address"><i class="bi bi-geo-alt"></i> ${place.address}</div>
                        <div class="place-rating"><i class="bi bi-star-fill"></i> ${place.rating}</div>
                        <div class="place-review">"${place.review}"</div>
                        <button class="add-to-route-btn" data-id="${place.id}">+ Добавить в маршрут</button>
                    `;
                    placeDiv.addEventListener('click', function(e) {
                        if (e.target.tagName !== 'BUTTON') {
                            map.setView(place.coords, 16);
                            markers[place.id].openPopup();
                        }
                    });
                    placesListDiv.appendChild(placeDiv);
                });

                // Добавляем обработчики на кнопки
                document.querySelectorAll('.add-to-route-btn').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const placeId = parseInt(this.dataset.id);
                        const place = places.find(p => p.id === placeId);
                        if (!currentRoute.find(item => item.id === placeId)) {
                            currentRoute.push(place);
                            localStorage.setItem('user_route', JSON.stringify(currentRoute));
                            renderRouteList();
                        } else {
                            alert('Это место уже в маршруте!');
                        }
                    });
                });
            }

            // --- Функция отображения маршрута ---
            function renderRouteList() {
                routeListDiv.innerHTML = '';
                if (currentRoute.length === 0) {
                    routeListDiv.innerHTML = '<p style="color:#999;">Маршрут пуст. Добавьте места из списка.</p>';
                    return;
                }
                currentRoute.forEach((place, index) => {
                    const routeItem = document.createElement('div');
                    routeItem.className = 'route-item';
                    routeItem.innerHTML = `
                        <span><strong>${index+1}.</strong> ${place.name}</span>
                        <button class="remove-btn" data-id="${place.id}"><i class="bi bi-trash"></i></button>
                    `;
                    routeListDiv.appendChild(routeItem);
                });

                document.querySelectorAll('.remove-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const placeId = parseInt(this.dataset.id);
                        currentRoute = currentRoute.filter(p => p.id !== placeId);
                        localStorage.setItem('user_route', JSON.stringify(currentRoute));
                        renderRouteList();
                    });
                });
            }

            clearBtn.addEventListener('click', function() {
                currentRoute = [];
                localStorage.setItem('user_route', JSON.stringify(currentRoute));
                renderRouteList();
            });

            renderPlacesList();
            renderRouteList();
        });
    </script>
</body>
</html>
